name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Generate macOS icon
        run: node scripts/create-mac-icon.cjs

      - name: Download FFmpeg tools
        run: npm run ffmpeg:download

      - name: Build macOS app artifacts
        run: node scripts/build.cjs all --clean
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-master-macos
          path: release-macos
          if-no-files-found: error
